<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <style>text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }</style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#2563eb"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000012"/></filter>
  </defs>
  <rect width="960" height="500" fill="#f8f6f3"/>
  <text x="480" y="38" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">Hybrid Retrieval Pipeline — retrieval.py</text>
  <text x="480" y="60" text-anchor="middle" fill="#6a6a6a" font-size="13">4-stage progressive ranking: Keyword → Semantic → Rank Fusion → Cross-Encoder</text>
  <rect x="360" y="80" width="240" height="60" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="480" y="107" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">User Query</text>
  <text x="480" y="127" text-anchor="middle" fill="#5a5a5a" font-size="12">"Who is Sam Altman?"</text>
  <rect x="390" y="175" width="180" height="55" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="480" y="198" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Embed Query</text>
  <text x="480" y="217" text-anchor="middle" fill="#5a5a5a" font-size="11">all-MiniLM-L6-v2 → 384d vector</text>
  <line x1="480" y1="140" x2="480" y2="173" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="275" width="175" height="80" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="167" y="302" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">BM25Okapi</text>
  <text x="167" y="320" text-anchor="middle" fill="#5a5a5a" font-size="11">Term freq × IDF</text>
  <text x="167" y="336" text-anchor="middle" fill="#5a5a5a" font-size="11">top_k=50 chunks</text>
  <rect x="390" y="275" width="180" height="80" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="480" y="302" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">ChromaDB</text>
  <text x="480" y="320" text-anchor="middle" fill="#5a5a5a" font-size="11">ANN vector search</text>
  <text x="480" y="336" text-anchor="middle" fill="#5a5a5a" font-size="11">1/(1+L2) → score</text>
  <rect x="706" y="275" width="174" height="80" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="793" y="302" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">Cohere Rerank</text>
  <text x="793" y="320" text-anchor="middle" fill="#5a5a5a" font-size="11">rerank-v3.5</text>
  <text x="793" y="336" text-anchor="middle" fill="#5a5a5a" font-size="11">cross-encoder</text>
  <line x1="390" y1="215" x2="200" y2="273" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="230" x2="480" y2="273" stroke="#5a5a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="108" x2="205" y2="273" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="240" y="400" width="200" height="70" rx="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="340" y="428" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">RRF Fusion</text>
  <text x="340" y="447" text-anchor="middle" fill="#5a5a5a" font-size="12">1/(60+rank+1) per list</text>
  <text x="340" y="463" text-anchor="middle" fill="#5a5a5a" font-size="11">top 20 → Cohere</text>
  <line x1="200" y1="355" x2="295" y2="398" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="355" x2="390" y2="398" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="435" x2="704" y2="350" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="522" y="377" width="70" height="18" rx="4" fill="#f8f6f3" opacity="0.95"/>
  <text x="557" y="390" text-anchor="middle" fill="#5a5a5a" font-size="11">top 20</text>
  <rect x="520" y="400" width="200" height="70" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="620" y="428" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">Parent Context Fetch</text>
  <text x="620" y="447" text-anchor="middle" fill="#5a5a5a" font-size="12">Child ID → Parent chunk</text>
  <text x="620" y="463" text-anchor="middle" fill="#5a5a5a" font-size="11">3000-char context window</text>
  <line x1="793" y1="355" x2="680" y2="398" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="754" y="400" width="180" height="75" rx="8" fill="#ffffff" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="768" y="418" fill="#1a1a1a" font-size="12" font-weight="600">Legend</text>
  <line x1="768" y1="430" x2="800" y2="430" stroke="#5a5a5a" stroke-width="2"/>
  <text x="808" y="434" fill="#5a5a5a" font-size="11">Vector path</text>
  <line x1="768" y1="448" x2="800" y2="448" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="808" y="452" fill="#5a5a5a" font-size="11">Text path (BM25)</text>
  <rect x="768" y="460" width="10" height="10" rx="3" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="784" y="470" fill="#5a5a5a" font-size="11">Rank fusion</text>
</svg>