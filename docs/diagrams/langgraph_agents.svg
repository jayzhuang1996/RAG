<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <style>text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }</style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/></marker>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00000015"/></filter>
  </defs>
  <rect width="960" height="540" fill="#f8f6f3"/>
  <text x="480" y="38" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="700">LangGraph Multi-Agent Synthesis Pipeline</text>
  <text x="480" y="72" text-anchor="middle" fill="#6a6a6a" font-size="13">AgentState TypedDict passes as a shared "baton" through each agent node</text>
  <rect x="280" y="85" width="400" height="75" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#sh)"/>
  <text x="480" y="108" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">AgentState (TypedDict)</text>
  <text x="480" y="126" text-anchor="middle" fill="#5a5a5a" font-size="12">query | context_text | graph_text</text>
  <text x="480" y="143" text-anchor="middle" fill="#5a5a5a" font-size="12">research_summary | analyst_insights | final_answer</text>
  <circle cx="100" cy="260" r="28" fill="#4a4a4a" filter="url(#sh)"/>
  <text x="100" y="265" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">START</text>
  <rect x="188" y="200" width="190" height="120" rx="14" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="283" y="228" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">Researcher</text>
  <text x="283" y="249" text-anchor="middle" fill="#5a5a5a" font-size="12">Reads: context_text</text>
  <text x="283" y="265" text-anchor="middle" fill="#5a5a5a" font-size="12">+ graph_text</text>
  <text x="283" y="281" text-anchor="middle" fill="#5a5a5a" font-size="12">Writes: research_summary</text>
  <text x="283" y="300" text-anchor="middle" fill="#4a4a4a" font-size="11" font-weight="600">temp=0.1 (deterministic)</text>
  <rect x="418" y="200" width="190" height="120" rx="14" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="513" y="228" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">Analyst</text>
  <text x="513" y="249" text-anchor="middle" fill="#5a5a5a" font-size="12">Reads: research_summary</text>
  <text x="513" y="265" text-anchor="middle" fill="#5a5a5a" font-size="12">So What? insights</text>
  <text x="513" y="281" text-anchor="middle" fill="#5a5a5a" font-size="12">Writes: analyst_insights</text>
  <text x="513" y="300" text-anchor="middle" fill="#4a4a4a" font-size="11" font-weight="600">temp=0.4 (analytical)</text>
  <rect x="648" y="200" width="190" height="120" rx="14" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
  <text x="743" y="228" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="700">Writer</text>
  <text x="743" y="249" text-anchor="middle" fill="#5a5a5a" font-size="12">Reads: all state fields</text>
  <text x="743" y="265" text-anchor="middle" fill="#5a5a5a" font-size="12">Premium newsletter</text>
  <text x="743" y="281" text-anchor="middle" fill="#5a5a5a" font-size="12">Writes: final_answer</text>
  <text x="743" y="300" text-anchor="middle" fill="#4a4a4a" font-size="11" font-weight="600">temp=0.5 (expressive)</text>
  <circle cx="880" cy="260" r="22" fill="#ffffff" stroke="#4a4a4a" stroke-width="3" filter="url(#sh)"/>
  <circle cx="880" cy="260" r="14" fill="#4a4a4a"/>
  <line x1="128" y1="260" x2="186" y2="260" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="378" y1="260" x2="416" y2="260" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="397" y="250" text-anchor="middle" fill="#5a5a5a" font-size="11" font-weight="500">state</text>
  <line x1="608" y1="260" x2="646" y2="260" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="627" y="250" text-anchor="middle" fill="#5a5a5a" font-size="11" font-weight="500">state</text>
  <line x1="838" y1="260" x2="857" y2="260" stroke="#5a5a5a" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="480" y1="160" x2="480" y2="196" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="188" y="360" width="190" height="50" rx="8" fill="#ffffff" stroke="#5a5a5a" stroke-width="1"/>
  <text x="283" y="380" text-anchor="middle" fill="#5a5a5a" font-size="11">moonshot-v1-128k</text>
  <text x="283" y="396" text-anchor="middle" fill="#5a5a5a" font-size="11">LangChain ChatOpenAI</text>
  <line x1="283" y1="320" x2="283" y2="358" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="418" y="360" width="190" height="50" rx="8" fill="#ffffff" stroke="#5a5a5a" stroke-width="1"/>
  <text x="513" y="380" text-anchor="middle" fill="#5a5a5a" font-size="11">moonshot-v1-128k</text>
  <text x="513" y="396" text-anchor="middle" fill="#5a5a5a" font-size="11">LangChain ChatOpenAI</text>
  <line x1="513" y1="320" x2="513" y2="358" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="648" y="360" width="190" height="50" rx="8" fill="#ffffff" stroke="#5a5a5a" stroke-width="1"/>
  <text x="743" y="380" text-anchor="middle" fill="#5a5a5a" font-size="11">moonshot-v1-128k</text>
  <text x="743" y="396" text-anchor="middle" fill="#5a5a5a" font-size="11">LangChain ChatOpenAI</text>
  <line x1="743" y1="320" x2="743" y2="358" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="280" y="438" width="400" height="60" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="462" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="600">StateGraph.compile() → synthesis_graph</text>
  <text x="480" y="482" text-anchor="middle" fill="#5a5a5a" font-size="12">synthesis_graph.invoke(initial_state) triggers full pipeline</text>
  <text x="162" y="260" text-anchor="middle" fill="#5a5a5a" font-size="10">state</text>
</svg>